name: Auto Create Pre-Release

on:
  push:
    branches:
      - 'release/**' # Triggers on any push to a branch starting with "release/"

jobs:
  build-and-prerelease:
    runs-on: ubuntu-latest

    # CRITICAL: This permission is required to allow the Action to create tags and releases
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tool
        run: python -m pip install --upgrade build

      - name: Build wheel and sdist
        run: python -m build
        # Produces dist/dev_tracker-X.Y.Z-py3-none-any.whl and dist/dev_tracker-X.Y.Z.tar.gz

      - name: Extract Version Name
        id: get_version
        run: |
          # Grabs the branch name (e.g., "release/v1.2.0")
          BRANCH_NAME="${GITHUB_REF_NAME}"
          # Strips the "release/" prefix to leave just "v1.2.0"
          VERSION="${BRANCH_NAME#release/}"
          # Tag pre-releases distinctly so they never collide with the final release tag
          PRERELEASE_TAG="${VERSION}-pre"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "PRERELEASE_TAG=$PRERELEASE_TAG" >> $GITHUB_OUTPUT

      - name: Create or Update GitHub Pre-Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get_version.outputs.PRERELEASE_TAG }}"
          VERSION="${{ steps.get_version.outputs.VERSION }}"

          # Check if the pre-release already exists
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Pre-release $TAG exists. Updating..."
            gh release edit "$TAG" \
              --title "Pre-Release $VERSION" \
              --generate-notes \
              --prerelease
            # Overwrite any old assets with the fresh build
            gh release upload "$TAG" dist/* --clobber
          else
            echo "Pre-release $TAG does not exist. Creating..."
            gh release create "$TAG" dist/* \
              --title "Pre-Release $VERSION" \
              --generate-notes \
              --target "$GITHUB_REF_NAME" \
              --prerelease
          fi