name: Auto Create Release
on:
  push:
    branches:
      - master # Triggers on every push to master; the job below filters for release merges
jobs:
  build-and-release:
    runs-on: ubuntu-latest
    # Only run when this push is a merge commit whose message references a release/** branch.
    if: contains(github.event.head_commit.message, 'release/')
    # CRITICAL: This permission is required to allow the Action to create tags, releases,
    # and to lock the release branch via the Branch Protection API
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history needed to inspect merge parents
      - name: Verify this merge came from a release/** branch
        id: check_release_merge
        run: |
          # Find the source branch of the most recent merge into master.
          # Works for standard GitHub "Merge pull request #N from org/release/v1.2.0" messages.
          MERGE_MSG="${{ github.event.head_commit.message }}"
          SOURCE_BRANCH=$(echo "$MERGE_MSG" | grep -oE 'release/[A-Za-z0-9._-]+' | head -n1 || true)
          if [ -z "$SOURCE_BRANCH" ]; then
            echo "Not a release/** merge — skipping release."
            echo "IS_RELEASE=false" >> $GITHUB_OUTPUT
          else
            echo "Detected merge from $SOURCE_BRANCH"
            echo "IS_RELEASE=true" >> $GITHUB_OUTPUT
            echo "SOURCE_BRANCH=$SOURCE_BRANCH" >> $GITHUB_OUTPUT
          fi
      - name: Set up Python
        if: steps.check_release_merge.outputs.IS_RELEASE == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tool
        if: steps.check_release_merge.outputs.IS_RELEASE == 'true'
        run: python -m pip install --upgrade build
      - name: Build wheel and sdist
        if: steps.check_release_merge.outputs.IS_RELEASE == 'true'
        run: python -m build
        # Produces dist/dev_tracker-X.Y.Z-py3-none-any.whl and dist/dev_tracker-X.Y.Z.tar.gz
      - name: Extract Version Name
        if: steps.check_release_merge.outputs.IS_RELEASE == 'true'
        id: get_version
        run: |
          # Strips the "release/" prefix from the detected source branch to leave just "v1.2.0"
          SOURCE_BRANCH="${{ steps.check_release_merge.outputs.SOURCE_BRANCH }}"
          VERSION="${SOURCE_BRANCH#release/}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Create or Update GitHub Release
        if: steps.check_release_merge.outputs.IS_RELEASE == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          # No tag exists yet at this point — gh release create will create it,
          # pointed at the current master commit (the merge commit itself).
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION exists. Promoting to final..."
            gh release edit "$VERSION" \
              --title "Release $VERSION" \
              --generate-notes \
              --prerelease=false \
              --latest
            # Overwrite any old assets with the fresh build
            gh release upload "$VERSION" dist/* --clobber
          else
            echo "Release $VERSION does not exist. Creating..."
            gh release create "$VERSION" dist/* \
              --title "Release $VERSION" \
              --generate-notes \
              --target "master" \
              --latest
          fi
      - name: Lock the release branch
        if: steps.check_release_merge.outputs.IS_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.check_release_merge.outputs.SOURCE_BRANCH }}
        run: |
          # Once the release has been built and published, freeze the source
          # release/** branch so it can no longer receive pushes. If a
          # protection rule already exists on this branch, this call updates
          # it in place and adds lock_branch=true on top of the existing config.
          echo "Locking branch: $BRANCH"
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "repos/${{ github.repository }}/branches/${BRANCH}/protection" \
            -f lock_branch=true \
            -f enforce_admins=true \
            -f required_status_checks='null' \
            -f required_pull_request_reviews='null' \
            -f restrictions='null'
