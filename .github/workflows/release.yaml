name: Auto Create Release

# Triggers precisely when a PR targeting master is closed (merged or not).
# We filter on "merged == true" in the job condition below, so this never
# fires for PRs that were closed without merging.
on:
  pull_request:
    types: [closed]
    branches:
      - master
  workflow_dispatch:
    inputs:
      release_branch:
        description: 'Release branch to publish (e.g. release/v1.2.0)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    # Only run when:
    #   - manually dispatched, or
    #   - the PR was actually merged (not just closed) AND it came from a release/** branch
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'release/'))
    # CRITICAL: contents:write is required to create tags/releases.
    # pull-requests:read lets us inspect PR metadata if ever needed.
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Resolve release branch
        id: resolve
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            BRANCH="${{ inputs.release_branch }}"
          else
            BRANCH="${{ github.event.pull_request.head.ref }}"
          fi
          VERSION="${BRANCH#release/}"
          echo "Release branch: $BRANCH"
          echo "Version: $VERSION"
          echo "BRANCH=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.BRANCH }}
          fetch-depth: 0 # full history; some build backends need tag history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tool
        run: python -m pip install --upgrade build

      - name: Build wheel and sdist
        env:
          # Pin the version explicitly instead of relying on setuptools-scm's
          # git-tag inference, which breaks on non-standard tags (e.g.
          # "0.1.0-pre.482476c") and ties the build to the release branch name
          # rather than arbitrary tag history.
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.resolve.outputs.VERSION }}
        run: python -m build
        # Produces dist/dev_tracker-X.Y.Z-py3-none-any.whl and dist/dev_tracker-X.Y.Z.tar.gz

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.resolve.outputs.VERSION }}"
          BRANCH="${{ steps.resolve.outputs.BRANCH }}"

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION exists. Updating..."
            gh release edit "$VERSION" \
              --title "Release $VERSION" \
              --generate-notes \
              --prerelease=false \
              --latest
            gh release upload "$VERSION" dist/* --clobber
          else
            echo "Release $VERSION does not exist. Creating..."
            gh release create "$VERSION" dist/* \
              --title "Release $VERSION" \
              --generate-notes \
              --target "master" \
              --latest
          fi

      - name: Lock release branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.resolve.outputs.BRANCH }}"
          echo "Locking branch: $BRANCH"
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "repos/${{ github.repository }}/branches/${BRANCH}/protection" \
            -f lock_branch=true \
            -f enforce_admins=true \
            -f required_status_checks='null' \
            -f required_pull_request_reviews='null' \
            -f restrictions='null'