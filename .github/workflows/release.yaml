name: Auto Create Release

on:
  push:
    tags:
      - 'v*' # Triggers on any pushed tag starting with "v" (e.g., v1.2.0)

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    # CRITICAL: This permission is required to allow the Action to create tags and releases
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tool
        run: python -m pip install --upgrade build

      - name: Build wheel and sdist
        run: python -m build
        # Produces dist/dev_tracker-X.Y.Z-py3-none-any.whl and dist/dev_tracker-X.Y.Z.tar.gz

      - name: Extract Version Name
        id: get_version
        run: |
          # Grabs the tag name (e.g., "v1.2.0")
          VERSION="${GITHUB_REF_NAME}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create or Update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"

          # Check if the release already exists
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION exists. Promoting to final..."
            gh release edit "$VERSION" \
              --title "Release $VERSION" \
              --generate-notes \
              --prerelease=false \
              --latest
            # Overwrite any old assets with the fresh build
            gh release upload "$VERSION" dist/* --clobber
          else
            echo "Release $VERSION does not exist. Creating..."
            gh release create "$VERSION" dist/* \
              --title "Release $VERSION" \
              --generate-notes \
              --target "$GITHUB_REF_NAME" \
              --latest
          fi